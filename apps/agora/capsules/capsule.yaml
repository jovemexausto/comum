name: agora
version: 0.1.0
description: Fluxo local de governanca para proposta, voto e fechamento.

artifact:
  crate: capsula-agora
  wasm: agora.wasm
  runtime_abi: comum-wasm-v1
  entrypoint: invoke

verbs:
  - name: agora/propose
    payload:
      body: text
      title: text
      author: did
      quorum: integer
      expires: integer
      proposal_id: bytes32
    notes:
      - proposal_id e derivado deterministicamente do conteudo central da proposta.

  - name: agora/vote
    payload:
      voter: did
      choice: integer
      proposal_id: bytes32
    choices:
      0: no
      1: yes
      2: abstain

  - name: agora/close
    payload:
      timestamp: integer
      proposal_id: bytes32

  - name: agora/closed
    payload:
      no: integer
      yes: integer
      passed: integer
      abstain: integer
      quorum_met: integer
      proposal_id: bytes32
