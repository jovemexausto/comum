name: feira
version: 0.1.0
description: Fluxo local de troca para oferta, aceite, entrega, recibo, cancelamento e disputa.

artifact:
  crate: capsula-feira
  wasm: feira.wasm
  runtime_abi: comum-wasm-v1
  entrypoint: invoke

verbs:
  - name: feira/offer
    payload:
      item: text
      price: integer
      seller: did
      expires: integer
      currency: text
      offer_id: bytes32
    notes:
      - offer_id e derivado deterministicamente do nucleo da oferta.
      - currency nomeia a unidade local usada na oferta.

  - name: feira/accept
    payload:
      buyer: did
      offer_id: bytes32

  - name: feira/deliver
    payload:
      offer_id: bytes32
      timestamp: integer

  - name: feira/receipt
    payload:
      offer_id: bytes32
      timestamp: integer

  - name: feira/cancel
    payload:
      reason: text
      offer_id: bytes32

  - name: feira/dispute
    payload:
      reason: text
      offer_id: bytes32
